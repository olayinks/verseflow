<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: tighten in production.
      'unsafe-inline' is only here for Vite HMR in dev.
      script-src 'self' is enforced by Electron's sandbox.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>VerseFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite replaces this with the compiled entry module -->
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
